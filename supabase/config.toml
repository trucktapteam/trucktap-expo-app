
[functions.notify-favorite-truck-open]
enabled = true
verify_jwt = true
import_map = "./functions/notify-favorite-truck-open/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/notify-favorite-truck-open/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/notify-favorite-truck-open/*.html" ]
[functions.notify-truck-announcement]
enabled = true
verify_jwt = false
import_map = "./functions/notify-truck-announcement/deno.json"
entrypoint = "./functions/notify-truck-announcement/index.ts"
[functions.notify-new-truck]
enabled = true
verify_jwt = false
import_map = "./functions/notify-new-truck/deno.json"
entrypoint = "./functions/notify-new-truck/index.ts"