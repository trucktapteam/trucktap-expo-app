name: Release quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check credential literals
        run: npm run check-credential-literals

      - name: Lint
        run: npm run lint

      - name: Typecheck application
        run: npm run typecheck

      - name: Run Node regression tests
        run: npm run test:node

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Typecheck Edge Functions
        run: >
          deno check --no-lock
          supabase/functions/account-delete/index.ts
          supabase/functions/notify-favorite-truck-open/index.ts
          supabase/functions/notify-hands-free-live-transition/index.ts
          supabase/functions/notify-new-favorite/index.ts
          supabase/functions/notify-new-review/index.ts
          supabase/functions/notify-new-truck/index.ts
          supabase/functions/notify-owner-message/index.ts
          supabase/functions/notify-truck-announcement/index.ts
          supabase/functions/whoami/index.ts

      - name: Validate Expo project
        run: npx expo-doctor
